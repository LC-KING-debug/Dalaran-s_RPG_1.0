<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dalaran's RPG - Terminal</title>
    <link rel="stylesheet" href="/static/css/game.css">
    <link rel="icon" type="image/png" href="/static/assets/icon/favico.png">
</head>
<body>
    <!-- Cortina de Transição Inicial Absoluta (Cobre tudo) -->
    <div id="page-transition" class="page-transition-overlay"></div>

    <div class="scanline"></div>

    <audio id="ambient-bgs">
        <source src="/static/assets/sounds/iniciogame.mp3" type="audio/mpeg">
    </audio>
    <audio id="click-sound">
        <source src="/static/assets/sounds/click.mp3" type="audio/mpeg">
    </audio>

    <!-- Transição do Game: Carregando progresso -->
    <div id="welcome-screen" class="welcome-overlay">
        <h1 id="welcome-text" class="glitch" data-text=""></h1>
    </div>

    <!-- Layout principal do console (oculto até acabar animação) -->
    <div id="main-game-layout" class="console-wrapper hidden">
        <main class="terminal-box">
            <div class="terminal-bar">
                <span id="active-char-display">AVATAR: ATIVO</span>
                <div style="display: flex; gap: 15px;">
                    <a href="/tela_personagens" class="disconnect-link transition-trigger" style="color:#00ff00;">[ GERENCIAR_AVATARES ]</a>
                    <a href="/logout" class="disconnect-link transition-trigger">[ VOLTAR_AO_LOGIN ]</a>
                </div>
            </div>
            <div id="terminal-log" class="terminal-log" aria-live="polite" aria-atomic="false">
                <p class="sys-output">[SISTEMA] Console de controle operational estabelecido.</p>
            </div>
            <div class="input-line">
                <span class="user-prompt">cmd:~$</span>
                <input type="text" id="terminal-input" autocomplete="off" placeholder="Insira dados..." aria-label="Linha de comando do terminal">
            </div>
        </main>

        <footer class="info-panel">
    <div id="guide">
        <h2>>> PROTOCOLO DE COMANDO</h2>
        <div class="grid-tips">
            <span><code>ir norte/sul/leste/oeste</code></span>
            <span><code>atacar</code>/<code>fugir</code></span>
            <span><code>/inventario</code></span>
            <span><code>/status</code></span>
            <span><code>/usar pocao de vida</code></span>
        </div>
    </div>
    <div id="redes_sociais">
         |<a href="https://github.com/LC-KING-debug/Dalaran-s_RPG_1.0" target="_blank">[GITHUB]</a>|
    </div>
</footer>

    <script src="/static/js/game.js"></script>
</body>
</html>
